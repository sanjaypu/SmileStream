version: "3.7"

services:
  postgres-db:
    image: postgres:15.5-alpine
    container_name: healenium-postgres
    restart: always
    environment:
      POSTGRES_DB: healenium
      POSTGRES_USER: healenium_user
      POSTGRES_PASSWORD: healenium
    ports:
      - "5432:5432"
    volumes:
      - healenium_pgdata:/var/lib/postgresql/data
      - ./db/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  healenium-backend:
    image: healenium/hlm-backend:3.4.6
    container_name: healenium-backend
    depends_on:
      - postgres-db
    restart: on-failure
    environment:
      SPRING_POSTGRES_DB: healenium
	  RECOVERY_TIMEOUT: "30"
      SPRING_POSTGRES_SCHEMA: healenium
      SPRING_POSTGRES_USER: healenium_user
      SPRING_POSTGRES_PASSWORD: healenium
      SPRING_POSTGRES_DB_HOST: postgres-db
      KEY_SELECTOR_URL: "false"
      COLLECT_METRICS: "true"
      HLM_LOG_LEVEL: info
    ports:
      - "7878:7878"
    volumes:
      - ./screenshots/:/screenshots
      - ./logs/:/logs

  selector-imitator:
    image: healenium/hlm-selector-imitator:1.4
    container_name: healenium-selector-imitator
    depends_on:
      - healenium-backend
    restart: on-failure
    ports:
      - "8000:8000"

volumes:
  healenium_pgdata:
